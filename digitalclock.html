<!DOCTYPE html>
<html>
<head>
    <title>Digital Clock</title>
    <style>
        body {
            background-color: black;
            color:lime;
            font-size: 50px;
            text-align: center;
            margin-top: 200px;
            font-family: Arial;
        }
    </style>
</head>
<body>

    <div id="clock"></div>

    <script>
        function showTime() {
            let date = new Date();

            let h = date.getHours();
            let m = date.getMinutes();
            let s = date.getSeconds();

            // Add leading zero
            if (h < 10) h = "0" + h;
            if (m < 10) m = "0" + m;
            if (s < 10) s = "0" + s;

            let time = h + ":" + m + ":" + s;

            document.getElementById("clock").innerHTML = time;
        }

        // Run every second
        setInterval(showTime, 1000);

        // Run immediately
        showTime();
    </script>

</body>
</html>
